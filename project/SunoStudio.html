<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SunoStudio — AI Music Creation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>
<div id="root"></div>

<script>
// TWEAK DEFAULTS — accent + font pairing persist on reload
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "lime",
  "fontPair": "mono-sans"
}/*EDITMODE-END*/;
window.__TWEAKS = TWEAK_DEFAULTS;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="covers.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="dialog.jsx"></script>
<script type="text/babel" src="createPanel.jsx"></script>
<script type="text/babel" src="simplePanel.jsx"></script>
<script type="text/babel" src="generation.jsx"></script>
<script type="text/babel" src="library.jsx"></script>
<script type="text/babel" src="playlists.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="lyricsOverlay.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
  // Apply persisted tweaks before mount
  const T = window.__TWEAKS || {};
  const InitialApp = () => {
    const [ready, setReady] = React.useState(false);
    React.useEffect(() => { setReady(true); }, []);
    return <App initialAccent={T.accent} initialFontPair={T.fontPair} />;
  };
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(
    <ConfirmProvider>
      <App />
    </ConfirmProvider>
  );
</script>
</body>
</html>
